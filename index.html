<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dumbdock</title>
<link rel="icon" href="/dumbdock.svg" type="image/svg+xml">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#0f1117;color:#e1e4e8;padding:2rem}
h1{font-size:1.5rem;margin-bottom:1.5rem;color:#f0f2f5}
h2{font-size:1.1rem;margin:1.5rem 0 0.75rem;color:#8b949e;text-transform:uppercase;letter-spacing:0.05em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1rem;display:flex;flex-direction:column}
.card-header{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem}
.card-header img{width:28px;height:28px;border-radius:4px;object-fit:contain}
.card-header .icon-placeholder{width:28px;height:28px;border-radius:4px;background:#21262d;display:flex;align-items:center;justify-content:center;font-size:14px;color:#8b949e}
.card-name{font-weight:600;font-size:1rem;color:#f0f2f5;text-decoration:none}
.card-name:hover{color:#58a6ff}
.card-desc{font-size:0.85rem;color:#8b949e;margin-bottom:0.5rem}
.card-meta{font-size:0.8rem;color:#6e7681;margin-top:auto;padding-top:0.5rem;border-top:1px solid #21262d;display:flex;flex-wrap:wrap;align-items:center;gap:0.25rem 1rem}
.card-meta span{display:block;margin-top:2px}
.card-meta .status-running{color:#3fb950}
.card-meta .status-exited{color:#f85149}
.card-meta .status-paused{color:#d29922}
.card-meta .toggle-btn{background:none;border:none;color:#8b949e;cursor:pointer;font-size:0.8rem;padding:4px 8px;border-radius:4px;flex-shrink:0;line-height:1;margin-left:auto}
.card-meta .toggle-btn:hover{color:#f0f2f5;background:#21262d}
.card-warnings{display:flex;flex-wrap:wrap;align-items:center;gap:0.35rem;margin-bottom:0.5rem;font-size:0.8rem}
.warning-icon{cursor:help;line-height:1;font-size:1rem}
.warning-public{color:#f85149}
.warning-private{color:#3fb950}
.warning-traefik{color:#58a6ff}
.traefik-url{color:#58a6ff;text-decoration:none;font-size:0.75rem;display:inline-flex;align-items:center;gap:0.15rem;padding:1px 4px;border-radius:3px;background:#1a2332}
.traefik-url:hover{background:#21262d;text-decoration:underline}
.unlabeled-warnings{flex-shrink:0;display:flex;align-items:center;gap:0.25rem;font-size:0.85rem}
.unlabeled-list{display:flex;flex-direction:column;gap:0.5rem}
.unlabeled-item{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:0;font-size:0.9rem}
.unlabeled-row{padding:0.75rem 1rem;display:flex;align-items:center;gap:1rem}
.unlabeled-item .name{font-weight:600;color:#f0f2f5;flex-shrink:0;min-width:180px}
.unlabeled-item .detail{color:#8b949e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.unlabeled-item .status{flex-shrink:0;min-width:70px;text-align:right}
.unlabeled-item .toggle-btn{background:none;border:none;color:#8b949e;cursor:pointer;font-size:0.8rem;padding:4px 8px;border-radius:4px;flex-shrink:0;line-height:1}
.unlabeled-item .toggle-btn:hover{color:#f0f2f5;background:#21262d}
.unlabeled-code{display:none;padding:0.75rem 1rem;background:#0d1117;border-top:1px solid #30363d;border-radius:0 0 6px 6px;line-height:1.5}
.unlabeled-code.open{display:block}

.unlabeled-section{margin-bottom:0.75rem}
.unlabeled-section:last-child{margin-bottom:0}
.unlabeled-section-title{font-size:0.75rem;color:#8b949e;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.4rem}

.unlabeled-info{display:grid;grid-template-columns:auto 1fr;gap:2px 1rem;font-size:0.8rem}
.unlabeled-info-key{color:#6e7681}
.unlabeled-info-value{color:#e1e4e8;word-break:break-all}

.unlabeled-labels{display:grid;grid-template-columns:auto 1fr;gap:2px 1rem;font-size:0.8rem}
.unlabeled-label-key{color:#6e7681;font-family:monospace;word-break:break-all}
.unlabeled-label-value{color:#e1e4e8;font-family:monospace;word-break:break-all}
.unlabeled-label-key.unlabeled-label-dumbdock{color:#58a6ff}
.unlabeled-label-value.unlabeled-label-dumbdock{color:#f0f2f5}

.unlabeled-no-labels{font-size:0.8rem;color:#6e7681;font-style:italic}

.unlabeled-code-separator{margin:0.75rem 0 0.5rem;border:none;border-top:1px solid #21262d}
.unlabeled-code-example{white-space:pre;font-family:monospace;font-size:0.8rem;color:#8b949e;overflow-x:auto}
.loading{text-align:center;padding:3rem;color:#8b949e}
.error{text-align:center;padding:2rem;color:#f85149}
.legend{display:flex;flex-wrap:wrap;align-items:center;gap:1rem;margin-bottom:1.5rem;padding:0.5rem 0.75rem;background:#161b22;border:1px solid #30363d;border-radius:6px;font-size:0.8rem;color:#8b949e}
.legend-item{display:inline-flex;align-items:center;gap:0.35rem;white-space:nowrap}
.legend-icon{font-size:1rem;line-height:1}
.legend-icon.legend-public{color:#f85149}
.legend-icon.legend-private{color:#3fb950}
.legend-icon.legend-traefik{color:#58a6ff}

/* Nav */
.nav-bar{display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem;padding:0.75rem 1rem;background:#161b22;border:1px solid #30363d;border-radius:8px}
.nav-title{font-size:1.2rem;font-weight:700;color:#f0f2f5;text-decoration:none}
.nav-tabs{display:flex;gap:0.5rem;margin-left:auto}
.nav-tab{padding:0.4rem 0.9rem;border-radius:6px;border:1px solid #30363d;background:transparent;color:#8b949e;cursor:pointer;font-size:0.85rem;transition:all 0.15s}
.nav-tab:hover{color:#f0f2f5;background:#21262d}
.nav-tab.active{color:#f0f2f5;background:#1f6feb;border-color:#1f6feb}
.nav-separator{display:inline-block;width:1px;height:20px;background:#30363d;flex-shrink:0}
.group-toggle{margin-left:0.5rem;border-color:#8b949e !important}
.group-toggle.active{color:#f0f2f5 !important;background:#21262d !important;border-color:#8b949e !important}
.copy-json-btn{margin-left:0.5rem;padding:0.4rem 0.9rem;border-radius:6px;border:1px solid #3fb950;background:transparent;color:#3fb950;cursor:pointer;font-size:0.85rem;transition:all 0.15s;white-space:nowrap}
.copy-json-btn:hover{color:#0d1117;background:#3fb950}
.copy-json-btn.copy-success{color:#0d1117;background:#3fb950;border-color:#3fb950}

/* Icons page */
.icon-search{margin-bottom:1rem;display:flex;align-items:center;gap:0.75rem}
.icon-search-input{flex:1;padding:0.6rem 0.75rem;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e1e4e8;font-size:0.9rem;outline:none}
.icon-search-input:focus{border-color:#58a6ff}
.icon-search-count{font-size:0.85rem;color:#8b949e;white-space:nowrap}
.icon-table-wrap{overflow-x:auto}
.icon-table{width:100%;border-collapse:collapse;font-size:0.85rem}
.icon-table th{padding:0.5rem 0.75rem;background:#161b22;border-bottom:2px solid #30363d;color:#8b949e;text-align:left;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap}
.icon-table td{padding:0.45rem 0.75rem;border-bottom:1px solid #21262d;color:#e1e4e8;vertical-align:middle}
.icon-table tr:hover td{background:#161b22}
.icon-table img{width:24px;height:24px;object-fit:contain;border-radius:3px}
.icon-table .slug-cell{font-family:monospace;font-size:0.8rem}
.icon-table .provider-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:0.75rem;font-weight:500;background:#1a2332;color:#58a6ff}
.icon-table .no-image{color:#6e7681;font-size:0.75rem;font-style:italic}
.icon-table .mapping-key{font-family:monospace;font-size:0.8rem;word-break:break-all}
.icon-table .empty-mapping{color:#6e7681;font-style:italic}
.icon-provider-filter{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:1rem}
.icon-provider-btn{padding:0.3rem 0.7rem;border-radius:6px;border:1px solid #30363d;background:transparent;color:#8b949e;cursor:pointer;font-size:0.8rem;transition:all 0.15s}
.icon-provider-btn:hover{color:#f0f2f5;background:#21262d}
.icon-provider-btn.active{color:#f0f2f5;background:#1f6feb;border-color:#1f6feb}
.icon-empty{text-align:center;padding:3rem;color:#8b949e}
.icon-loading{text-align:center;padding:3rem;color:#8b949e}
.icon-error{text-align:center;padding:2rem;color:#f85149}
.icon-sentinel td{height:1px;padding:0;border-bottom:none}

/* Card detail modal pop-out */
.detail-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000}
.detail-backdrop.open{display:block}
.card .unlabeled-code.open{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);max-width:900px;width:90vw;max-height:85vh;overflow-y:auto;z-index:1001;border-radius:10px;box-shadow:0 16px 48px rgba(0,0,0,0.5);padding:2rem 1.5rem 1.5rem;line-height:1.6;border:1px solid #30363d}
.detail-close{position:absolute;top:12px;right:14px;background:none;border:none;color:#8b949e;cursor:pointer;font-size:1rem;padding:4px 8px;border-radius:4px;line-height:1;z-index:1002}
.detail-close:hover{color:#f0f2f5;background:#21262d}

/* Footer */
.footer{text-align:center;padding:1.5rem;font-size:0.75rem;color:#6e7681;border-top:1px solid #21262d;margin-top:1.5rem}
.footer-link{color:#6e7681;text-decoration:none;display:inline-flex;align-items:center;vertical-align:middle}
.footer-link:hover{color:#f0f2f5}
.footer-link svg{vertical-align:middle}

/* ===== Traefik Dashboard Page ===== */
.traefik-version-banner{margin-bottom:1.25rem;padding:1rem 1.25rem;background:#1a2332;border:1px solid #30363d;border-radius:8px;font-size:0.95rem;line-height:1.5}
.traefik-version-banner strong{color:#f0f2f5;font-size:1.1rem}
.traefik-version-banner .version-meta{color:#8b949e;font-size:0.85rem;margin-top:0.3rem}
.traefik-version-banner .version-meta span{margin-right:1.5rem}
.traefik-version-banner .traefik-source{display:block;margin-top:0.4rem;font-size:0.8rem;color:#6e7681;word-break:break-all}

.traefik-stats{display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:1.5rem}
.traefik-stat-card{flex:1 1 140px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:0.85rem 1rem;text-align:center}
.traefik-stat-card .stat-count{font-size:1.6rem;font-weight:700;color:#f0f2f5}
.traefik-stat-card .stat-label{font-size:0.75rem;color:#8b949e;text-transform:uppercase;letter-spacing:0.05em;margin-top:0.2rem}
.traefik-stat-card.stat-http .stat-count{color:#58a6ff}
.traefik-stat-card.stat-tcp .stat-count{color:#d29922}
.traefik-stat-card.stat-middleware .stat-count{color:#3fb950}
.traefik-stat-card.stat-entrypoint .stat-count{color:#f0883e}

.traefik-section{margin-bottom:1.5rem}
.traefik-section h2{font-size:1.1rem;margin:0 0 0.6rem;color:#8b949e;text-transform:uppercase;letter-spacing:0.05em}
.traefik-section .section-subtitle{font-size:0.8rem;color:#6e7681;margin-top:-0.4rem;margin-bottom:0.75rem}

.traefik-empty{text-align:center;padding:2rem;color:#6e7681;font-style:italic;background:#161b22;border:1px solid #30363d;border-radius:6px}

.traefik-table-wrap{overflow-x:auto;background:#161b22;border:1px solid #30363d;border-radius:8px}
.traefik-table{width:100%;border-collapse:collapse;font-size:0.85rem}
.traefik-table th{padding:0.55rem 0.75rem;background:#1c2128;border-bottom:2px solid #30363d;color:#8b949e;text-align:left;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap}
.traefik-table td{padding:0.5rem 0.75rem;border-bottom:1px solid #21262d;color:#e1e4e8;vertical-align:middle}
.traefik-table tr:last-child td{border-bottom:none}
.traefik-table tr:hover td{background:#1c2128}

.status-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:0.75rem;font-weight:600;white-space:nowrap}
.status-badge.enabled{color:#3fb950;background:#0a2e14}
.status-badge.disabled{color:#6e7681;background:#1c2128}
.status-badge.warning{color:#d29922;background:#2a1f0a}
.status-badge.error{color:#f85149;background:#2f0e12}

.server-up{display:inline-flex;align-items:center;gap:0.3rem;color:#3fb950;font-size:0.8rem;white-space:nowrap}
.server-up::before{content:"";width:8px;height:8px;border-radius:50%;background:#3fb950;flex-shrink:0}
.server-down{display:inline-flex;align-items:center;gap:0.3rem;color:#f85149;font-size:0.8rem;white-space:nowrap}
.server-down::before{content:"";width:8px;height:8px;border-radius:50%;background:#f85149;flex-shrink:0}
.server-unknown{display:inline-flex;align-items:center;gap:0.3rem;color:#8b949e;font-size:0.8rem;white-space:nowrap}
.server-unknown::before{content:"";width:8px;height:8px;border-radius:50%;background:#8b949e;flex-shrink:0}

.traefik-rule{font-family:monospace;font-size:0.8rem;color:#d29922;word-break:break-word}
.traefik-service-name{font-weight:500;color:#58a6ff}
.traefik-middleware-tag{display:inline-block;padding:1px 5px;margin:1px 2px;border-radius:3px;background:#1a2332;color:#8b949e;font-size:0.75rem;font-family:monospace}
.traefik-entrypoint-tag{display:inline-block;padding:1px 5px;margin:1px 2px;border-radius:3px;background:#21262d;color:#8b949e;font-size:0.75rem;font-family:monospace}
.traefik-tls-true{color:#3fb950;font-weight:600}
.traefik-tls-false{color:#6e7681}

.cert-table .cert-expired{color:#f85149;font-weight:600}
.cert-table .cert-ok{color:#3fb950}
.cert-table .cert-warning{color:#d29922}
.cert-table .cert-domain{font-family:monospace;font-size:0.82rem}
.cert-table .cert-subject{color:#8b949e;font-size:0.8rem}

.traefik-error-banner{padding:1rem;background:#2f0e12;border:1px solid #f85149;border-radius:8px;color:#f0f2f5;margin-bottom:1rem;display:flex;align-items:flex-start;gap:0.75rem}
.traefik-error-banner .err-icon{color:#f85149;font-size:1.2rem;flex-shrink:0;line-height:1}
.traefik-error-banner .err-body{flex:1}
.traefik-error-banner .err-title{font-weight:600;margin-bottom:0.3rem}
.traefik-error-banner .err-detail{font-size:0.85rem;color:#8b949e}
.traefik-error-banner .err-retry{padding:0.3rem 0.7rem;border-radius:6px;border:1px solid #f85149;background:transparent;color:#f85149;cursor:pointer;font-size:0.8rem;margin-top:0.5rem;transition:all 0.15s}
.traefik-error-banner .err-retry:hover{background:#3d1116}

.traefik-server-list{display:flex;flex-direction:column;gap:0.2rem}
.traefik-server-list .server-item{font-size:0.8rem;font-family:monospace;word-break:break-all}
</style>
</head>
<body>
<div class="nav-bar">
  <span class="nav-title"><img src="/dumbdock.svg" width="24" height="24" alt="" style="vertical-align:middle;margin-right:6px">dumbdock</span>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="nav-tab" onclick="switchTab('icons')">Icons</button>
    <button class="nav-tab" id="nav-traefik" onclick="switchTab('traefik')" style="display:none">Traefik</button>
  </div>
  <span class="nav-separator"></span>
  <button class="nav-tab group-toggle" id="group-toggle-btn" onclick="toggleGroupView()" title="Switch between group and compose project view">By Compose</button>
  <button class="copy-json-btn" id="copy-json-btn" onclick="copyDashboardJSON()" title="Copy all dashboard data as JSON">Copy JSON</button>
</div>

<div id="page-dashboard">
<div class="legend">
  <span class="legend-item"><span class="legend-icon legend-public">&#9650;</span> Public port binding</span>
  <span class="legend-item"><span class="legend-icon legend-private">&#9679;</span> Private port binding</span>
  <span class="legend-item"><span class="legend-icon legend-traefik">&#128279;</span> Traefik enabled</span>
  <span class="legend-item"><span class="legend-icon">&#127760;</span> Traefik URL</span>
</div>
<div id="app">
  <div class="loading">Loading containers...</div>
</div>
<div class="footer">dumbdock <span id="version-display"></span> · <a class="footer-link" href="https://github.com/jordantrizz/dumbdock" target="_blank" rel="noopener nofollow" aria-label="View on GitHub"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a></div>
</div>

<div id="page-icons" style="display:none">
  <div class="icon-search">
    <input class="icon-search-input" id="iconSearch" type="text" placeholder="Search image names, icon slugs, or providers..." oninput="filterIcons()">
    <span class="icon-search-count" id="iconCount"></span>
    <a href="/api/icons" target="_blank" class="icon-provider-btn" style="text-decoration:none;flex-shrink:0">View raw JSON</a>
  </div>
  <div class="icon-provider-filter" id="providerFilters"></div>
  <div id="iconResults"></div>
</div>

<div id="page-traefik" style="display:none">
  <div id="traefik-app">
    <div class="loading">Loading Traefik status...</div>
  </div>
</div>

<div id="detail-backdrop" class="detail-backdrop"></div>
<script>
let dashboardData = null;
let composeGroupView = false;
const expandedItems = new Set();
async function load() {
  try {
    const res = await fetch('/api/containers');
    const data = await res.json();
    dashboardData = data;
    // Restore toggle state from localStorage after data loads.
    if (localStorage.getItem('dumbdock-compose-view') === 'true') {
      composeGroupView = true;
      var btn = document.getElementById('group-toggle-btn');
      if (btn) {
        btn.textContent = 'By Group';
        btn.classList.add('active');
      }
    }
    render(data);
    // Show/hide the Traefik nav tab based on whether a Traefik container was detected.
    var traefikTab = document.getElementById('nav-traefik');
    if (traefikTab) {
      traefikTab.style.display = data.hasTraefik ? '' : 'none';
    }
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="error">Failed to load containers: ' + e.message + '</div>';
  }
}

function render(data) {
  let html = '';

  if (composeGroupView && data.composeGrouped && data.composeProjects) {
    for (const project of data.composeProjects) {
      const cards = data.composeGrouped[project];
      if (!cards || cards.length === 0) continue;
      html += '<h2>' + escapeHtml(project) + ' <span style="color:#6e7681;font-weight:400;text-transform:none;letter-spacing:0">(' + cards.length + ')</span></h2>';
      html += '<div class="grid">';
      for (const card of cards) {
        html += renderCard(card);
      }
      html += '</div>';
    }
  } else {
    for (const group of data.groups) {
      const cards = data.grouped[group];
      html += '<h2>' + escapeHtml(group) + '</h2>';
      html += '<div class="grid">';
      for (const card of cards) {
        html += renderCard(card);
      }
      html += '</div>';
    }

    if (data.unlabeled && data.unlabeled.length > 0) {
      html += '<h2>Unlabeled <span style="color:#6e7681;font-weight:400;text-transform:none;letter-spacing:0">(' + data.unlabeled.length + ')</span></h2>';
      html += '<div class="unlabeled-list">';
      for (const card of data.unlabeled) {
        html += renderUnlabeled(card);
      }
      html += '</div>';
    }
  }

  var hasGroups = composeGroupView && data.composeProjects ? data.composeProjects.length > 0 : data.groups.length > 0;
  var hasUnlabeled = composeGroupView ? false : data.unlabeled && data.unlabeled.length > 0;
  if (!hasGroups && !hasUnlabeled) {
    html = '<div class="loading">No running containers found.</div>';
  }

  // Collect currently open item IDs from the DOM before replacing
  document.querySelectorAll('.unlabeled-code.open').forEach(function(el) {
    expandedItems.add(el.id);
  });

  document.getElementById('app').innerHTML = html;

  // Re-apply open state to any items that were expanded
  var stale = [];
  expandedItems.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) {
      el.classList.add('open');
      var container = el.closest('.card, .unlabeled-item');
      var btn = container.querySelector('.toggle-btn');
      if (btn) btn.innerHTML = '&#9660;';
      if (container.classList.contains('card')) {
        var backdrop = document.getElementById('detail-backdrop');
        if (backdrop) backdrop.classList.add('open');
      }
    } else {
      stale.push(id);
    }
  });
  stale.forEach(function(id) { expandedItems.delete(id); });
}

function renderDetailSections(card) {
  // Current Labels section
  let labelsHtml = '';
  if (card.labels && Object.keys(card.labels).length > 0) {
    labelsHtml += '<div class="unlabeled-section">';
    labelsHtml += '<div class="unlabeled-section-title">Current Labels</div>';
    labelsHtml += '<div class="unlabeled-labels">';
    const keys = Object.keys(card.labels).sort();
    for (const key of keys) {
      const value = card.labels[key];
      const isDumbdock = key.startsWith('dumbdock.');
      const keyCls = isDumbdock ? 'unlabeled-label-key unlabeled-label-dumbdock' : 'unlabeled-label-key';
      const valCls = isDumbdock ? 'unlabeled-label-value unlabeled-label-dumbdock' : 'unlabeled-label-value';
      labelsHtml += '<span class="' + keyCls + '">' + escapeHtml(key) + '</span>';
      labelsHtml += '<span class="' + valCls + '">' + escapeHtml(value) + '</span>';
    }
    labelsHtml += '</div></div>';
  } else {
    labelsHtml += '<div class="unlabeled-section">';
    labelsHtml += '<div class="unlabeled-section-title">Current Labels</div>';
    labelsHtml += '<div class="unlabeled-no-labels">No labels set on this container</div>';
    labelsHtml += '</div>';
  }

  // Container Info section
  let infoHtml = '<div class="unlabeled-section">';
  infoHtml += '<div class="unlabeled-section-title">Container Info</div>';
  infoHtml += '<div class="unlabeled-info">';
  infoHtml += '<span class="unlabeled-info-key">Container ID</span><span class="unlabeled-info-value">' + escapeHtml(card.containerId) + '</span>';
  infoHtml += '<span class="unlabeled-info-key">Image</span><span class="unlabeled-info-value">' + escapeHtml(card.image) + '</span>';
  if (card.created) {
    infoHtml += '<span class="unlabeled-info-key">Created</span><span class="unlabeled-info-value">' + formatTimestamp(card.created) + '</span>';
  }
  infoHtml += '<span class="unlabeled-info-key">Status</span><span class="unlabeled-info-value">' + escapeHtml(card.status) + '</span>';
  if (card.ports) {
    infoHtml += '<span class="unlabeled-info-key">Ports</span><span class="unlabeled-info-value">' + escapeHtml(card.ports) + '</span>';
  }
  infoHtml += '</div></div>';

  // Auto-Detection section
  let autoDetectHtml = '';
  if (card.autoDetectFailedReason) {
    autoDetectHtml += '<div class="unlabeled-section">';
    autoDetectHtml += '<div class="unlabeled-section-title">Auto-Detection</div>';
    autoDetectHtml += '<div class="unlabeled-info">';
    autoDetectHtml += '<span class="unlabeled-info-key">Reason</span>';
    autoDetectHtml += '<span class="unlabeled-info-value" style="color:#d29922">' + escapeHtml(card.autoDetectFailedReason) + '</span>';
    autoDetectHtml += '</div></div>';
  }

  // Network Warnings expanded section
  let networkWarningsHtml = '';
  const networkWarningsItems = [];
  if (card.hasPublicBinding) {
    const ips = card.publicBindingIPs && card.publicBindingIPs.length > 0 ? card.publicBindingIPs.join(', ') : '0.0.0.0';
    networkWarningsItems.push('<span class="unlabeled-info-key">&#9650; Public Binding</span><span class="unlabeled-info-value" style="color:#f85149">Bound to ' + escapeHtml(ips) + '</span>');
  }
  if (card.hasPrivateBinding) {
    const ips = card.privateBindingIPs && card.privateBindingIPs.length > 0 ? card.privateBindingIPs.join(', ') : 'private';
    networkWarningsItems.push('<span class="unlabeled-info-key">&#9679; Private Binding</span><span class="unlabeled-info-value" style="color:#3fb950">Bound to ' + escapeHtml(ips) + '</span>');
  }
  if (card.traefikEnabled) {
    networkWarningsItems.push('<span class="unlabeled-info-key">&#128279; Traefik</span><span class="unlabeled-info-value" style="color:#58a6ff">Enabled on this container</span>');
  }
  if (card.traefikURLs && card.traefikURLs.length > 0) {
    for (let u of card.traefikURLs) {
      networkWarningsItems.push('<span class="unlabeled-info-key">&#127760; URL</span><span class="unlabeled-info-value"><a href="' + escapeHtml(u) + '" target="_blank" rel="noopener" style="color:#58a6ff">' + escapeHtml(u) + '</a></span>');
    }
  }
  if (networkWarningsItems.length > 0) {
    networkWarningsHtml = '<div class="unlabeled-section">';
    networkWarningsHtml += '<div class="unlabeled-section-title">Network Warnings</div>';
    networkWarningsHtml += '<div class="unlabeled-info">';
    networkWarningsHtml += networkWarningsItems.join('');
    networkWarningsHtml += '</div></div>';
  }

  // Example Config section
  const cname = escapeHtml(card.containerName);
  const example =
    '# docker-compose.yml labels:\n' +
    'labels:\n' +
    '  dumbdock.name: "' + cname + '"\n' +
    '  dumbdock.group: "My Group"\n' +
    '  dumbdock.icon: "https://example.com/icon.png"\n' +
    '  dumbdock.href: "https://example.com"\n' +
    '  dumbdock.description: "What this container does"\n' +
    '  dumbdock.order: "1"\n' +
    '\n' +
    '# Or dumbdock.json:\n' +
    '{\n' +
    '  "containers": {\n' +
    '    "' + cname + '": {\n' +
    '      "name": "' + cname + '",\n' +
    '      "group": "My Group",\n' +
    '      "icon": "https://example.com/icon.png",\n' +
    '      "href": "https://example.com",\n' +
    '      "description": "What this container does",\n' +
    '      "order": 1\n' +
    '    }\n' +
    '  }\n' +
    '}';
  const exampleHtml = '<hr class="unlabeled-code-separator"><div class="unlabeled-section-title">Example Config</div><div class="unlabeled-code-example">' + example + '</div>';

  return labelsHtml + infoHtml + autoDetectHtml + networkWarningsHtml + exampleHtml;
}

function renderCard(card) {
  const icon = card.icon ? '<img src="' + escapeHtml(card.icon) + '" alt="">' : '<div class="icon-placeholder">&#9632;</div>';
  const href = card.href ? 'href="' + escapeHtml(card.href) + '" target="_blank" rel="noopener"' : '';
  const name = href ? '<a class="card-name" ' + href + '>' + escapeHtml(card.name) + '</a>' : '<span class="card-name">' + escapeHtml(card.name) + '</span>';
  const desc = card.description ? '<div class="card-desc">' + escapeHtml(card.description) + '</div>' : '';

  // Network warnings
  let warningsHtml = '';
  const warnings = [];
  if (card.hasPublicBinding) {
    const ips = card.publicBindingIPs && card.publicBindingIPs.length > 0 ? card.publicBindingIPs.join(', ') : 'non-localhost';
    warnings.push('<span class="warning-icon warning-public" title="Port bound to non-localhost IP: ' + escapeHtml(ips) + '">&#9650;</span>');
  }
  if (card.hasPrivateBinding) {
    const ips = card.privateBindingIPs && card.privateBindingIPs.length > 0 ? card.privateBindingIPs.join(', ') : 'private';
    warnings.push('<span class="warning-icon warning-private" title="Port bound to private IP: ' + escapeHtml(ips) + '">&#9679;</span>');
  }
  if (card.traefikEnabled) {
    warnings.push('<span class="warning-icon warning-traefik" title="Traefik enabled">&#128279;</span>');
  }
  if (card.traefikURLs && card.traefikURLs.length > 0) {
    for (let u of card.traefikURLs) {
      warnings.push('<a class="traefik-url" href="' + escapeHtml(u) + '" target="_blank" rel="noopener">&#127760; ' + escapeHtml(u.replace('https://', '')) + '</a>');
    }
  }
  if (warnings.length > 0) {
    warningsHtml = '<div class="card-warnings">' + warnings.join('') + '</div>';
  }

  const id = 'code-' + card.containerId;
  const detailSections = renderDetailSections(card);

  return '<div class="card">' +
    '<div class="card-header">' + icon + name + '</div>' +
    desc +
    warningsHtml +
    '<div class="card-meta"><span class="status-' + card.state + '">' + escapeHtml(card.status) + '</span><span>' + escapeHtml(card.containerName) + '</span><button class="toggle-btn" onclick="toggleCode(\'' + id + '\')">&#9654;</button></div>' +
    '<div id="' + id + '" class="unlabeled-code"><button class="detail-close" onclick="toggleCode(\'' + id + '\')">&#10005;</button>' + detailSections + '</div>' +
    '</div>';
}

function toggleCode(id) {
  const el = document.getElementById(id);
  const container = el.closest('.card, .unlabeled-item');
  const btn = container.querySelector('.toggle-btn');

  if (el.classList.contains('open')) {
    el.classList.remove('open');
    btn.innerHTML = '&#9654;';
    expandedItems.delete(id);
    if (container.classList.contains('card')) {
      document.getElementById('detail-backdrop').classList.remove('open');
    }
  } else {
    // For card modals, close any other open card detail first (only one at a time)
    if (container.classList.contains('card')) {
      document.querySelectorAll('.card .unlabeled-code.open').forEach(function(other) {
        toggleCode(other.id);
      });
    }
    el.classList.add('open');
    btn.innerHTML = '&#9660;';
    expandedItems.add(id);
    if (container.classList.contains('card')) {
      document.getElementById('detail-backdrop').classList.add('open');
    }
  }
}

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTimestamp(unix) {
  const now = Date.now() / 1000;
  const diff = now - unix;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
  if (diff < 86400) return Math.floor(diff / 3600) + ' hours ago';
  if (diff < 604800) return Math.floor(diff / 86400) + ' days ago';
  if (diff < 2592000) return Math.floor(diff / 604800) + ' weeks ago';
  return Math.floor(diff / 2592000) + ' months ago';
}

// ---- Copy JSON ----
function copyDashboardJSON() {
  const btn = document.getElementById('copy-json-btn');
  if (!dashboardData) {
    btn.textContent = 'No data';
    setTimeout(function() { btn.textContent = 'Copy JSON'; }, 2000);
    return;
  }
  const json = JSON.stringify(dashboardData, null, 2);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(json).then(function() {
      btn.textContent = 'Copied! \u2713';
      btn.classList.add('copy-success');
      setTimeout(function() {
        btn.textContent = 'Copy JSON';
        btn.classList.remove('copy-success');
      }, 2000);
    }).catch(function() {
      btn.textContent = 'Failed';
      setTimeout(function() { btn.textContent = 'Copy JSON'; }, 2000);
    });
  } else {
    // Fallback for older browsers
    try {
      var ta = document.createElement('textarea');
      ta.value = json;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = 'Copied! \u2713';
      btn.classList.add('copy-success');
      setTimeout(function() {
        btn.textContent = 'Copy JSON';
        btn.classList.remove('copy-success');
      }, 2000);
    } catch (e) {
      btn.textContent = 'Failed';
      setTimeout(function() { btn.textContent = 'Copy JSON'; }, 2000);
    }
  }
}

async function loadIcons() {

function buildProviderFilters() {
  const container = document.getElementById('providerFilters');

  // Compute count for each provider: mappings + known slugs not in mappings
  const providerCounts = iconsData.iconSets.map(set => {
    const mappedVals = new Set(Object.values(set.mappings));
    const unmapped = set.slugs.filter(s => !mappedVals.has(s));
    return Object.keys(set.mappings).length + unmapped.length;
  });
  const totalCount = providerCounts.reduce((a, b) => a + b, 0);

  let html = '<button class="icon-provider-btn active" data-provider="all" onclick="filterByProvider(this, \'all\')">All <span style="color:#6e7681">(' + totalCount + ')</span></button>';
  for (let i = 0; i < iconsData.iconSets.length; i++) {
    const set = iconsData.iconSets[i];
    const count = providerCounts[i];
    html += '<button class="icon-provider-btn" data-provider="' + escapeHtml(set.name) + '" onclick="filterByProvider(this, \'' + escapeHtml(set.name) + '\')">' + escapeHtml(set.name) + ' <span style="color:#6e7681">(' + count + ')</span></button>';
  }
  container.innerHTML = html;
}

let activeProvider = 'all';
let allIconRows = [];
let displayLimit = 100;
const ROW_INCREMENT = 100;
let iconObserver = null;
let iconLoadingMore = false;

function filterByProvider(btn, provider) {
  activeProvider = provider;
  document.querySelectorAll('.icon-provider-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterIcons();
}

let filterTimeout = null;

function filterIcons() {
  clearTimeout(filterTimeout);
  filterTimeout = setTimeout(applyFilter, 150);
}

function applyFilter() {
  if (!iconsData) return;
  const q = document.getElementById('iconSearch').value.toLowerCase();
  const container = document.getElementById('iconResults');

  allIconRows = [];

  for (const set of iconsData.iconSets) {
    if (activeProvider !== 'all' && activeProvider !== set.name) continue;

    // Mappings (image name -> icon slug)
    for (const [imageName, slug] of Object.entries(set.mappings)) {
      if (q && !imageName.toLowerCase().includes(q) && !slug.toLowerCase().includes(q) && !set.name.toLowerCase().includes(q)) continue;
      allIconRows.push({
        imageName: imageName,
        slug: slug,
        provider: set.name,
        cdnUrl: set.cdnUrlTemplate.replace('{slug}', slug),
        isMapping: true
      });
    }

    // Known slugs without an explicit mapping entry
    const mapped = new Set(Object.values(set.mappings));
    for (const slug of set.slugs) {
      if (mapped.has(slug)) continue;
      if (q && !slug.toLowerCase().includes(q) && !set.name.toLowerCase().includes(q)) continue;
      allIconRows.push({
        imageName: null,
        slug: slug,
        provider: set.name,
        cdnUrl: set.cdnUrlTemplate.replace('{slug}', slug),
        isMapping: false
      });
    }
  }

  document.getElementById('iconCount').textContent = allIconRows.length + ' icon' + (allIconRows.length !== 1 ? 's' : '');

  if (allIconRows.length === 0) {
    container.innerHTML = '<div class="icon-empty">No icons match your search.</div>';
    return;
  }

  // Reset lazy loading state and rebuild from scratch
  if (iconObserver) iconObserver.disconnect();
  displayLimit = ROW_INCREMENT;
  iconLoadingMore = false;
  renderIconTable(false);
}

function rowToHtml(row) {
  const imgName = row.isMapping
    ? '<span class="mapping-key">' + escapeHtml(row.imageName) + '</span>'
    : '<span class="empty-mapping">&mdash; (known slug)</span>';
  const preview = '<img src="' + escapeHtml(row.cdnUrl) + '" alt="' + escapeHtml(row.slug) + '" loading="lazy" onerror="this.style.display=\'none\'">';
  return '<tr><td>' + imgName + '</td><td class="slug-cell">' + escapeHtml(row.slug) + '</td><td><span class="provider-badge">' + escapeHtml(row.provider) + '</span></td><td>' + preview + '</td></tr>';
}

function loadMoreIcons() {
  if (iconLoadingMore) return;
  if (displayLimit >= allIconRows.length) return;
  iconLoadingMore = true;
  displayLimit = Math.min(displayLimit + ROW_INCREMENT, allIconRows.length);
  renderIconTable(true);
  iconLoadingMore = false;
}

function renderIconTable(append) {
  const container = document.getElementById('iconResults');
  const count = Math.min(displayLimit, allIconRows.length);

  if (!append) {
    // Full render: build the entire table from scratch
    let html = '<div class="icon-table-wrap"><table class="icon-table"><thead><tr><th>Image Name</th><th>Icon Slug</th><th>Provider</th><th>Preview</th></tr></thead><tbody>';
    for (let i = 0; i < count; i++) {
      html += rowToHtml(allIconRows[i]);
    }
    // Add sentinel row if there are more icons to lazy load
    if (count < allIconRows.length) {
      html += '<tr id="iconSentinel" class="icon-sentinel"><td colspan="4"></td></tr>';
    }
    html += '</tbody></table></div>';
    container.innerHTML = html;
  } else {
    // Append mode: insert new rows before the existing sentinel
    const sentinel = document.getElementById('iconSentinel');
    if (!sentinel) return;
    const prevCount = count - ROW_INCREMENT;
    let html = '';
    for (let i = prevCount; i < count; i++) {
      html += rowToHtml(allIconRows[i]);
    }
    sentinel.insertAdjacentHTML('beforebegin', html);
    // If all icons are now displayed, remove the sentinel
    if (count >= allIconRows.length) {
      if (iconObserver) iconObserver.unobserve(sentinel);
      sentinel.remove();
      return;
    }
  }

  // Observe the sentinel for infinite scroll
  const sentinel = document.getElementById('iconSentinel');
  if (sentinel) {
    if (!iconObserver) {
      iconObserver = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting) {
          loadMoreIcons();
        }
      }, { rootMargin: '200px' });
    }
    iconObserver.observe(sentinel);
  }
}

// ===== Traefik Dashboard =====

async function loadTraefik() {
  var container = document.getElementById('traefik-app');
  try {
    var res = await fetch('/api/traefik');
    var data = await res.json();
    renderTraefik(data);
  } catch (e) {
    container.innerHTML = '<div class="traefik-error-banner"><span class="err-icon">&#9888;</span><div class="err-body"><div class="err-title">Failed to load Traefik status</div><div class="err-detail">' + escapeHtml(e.message) + '</div><button class="err-retry" onclick="loadTraefik()">Retry</button></div></div>';
  }
}

function renderTraefik(resp) {
  var container = document.getElementById('traefik-app');

  if (!resp.found) {
    container.innerHTML = '<div class="traefik-empty">No Traefik container detected. Start a container with \"traefik\" in the image name.</div>';
    return;
  }

  var html = '';

  // Error banner (if API is unreachable)
  if (resp.error && !resp.data) {
    html += '<div class="traefik-error-banner"><span class="err-icon">&#9888;</span><div class="err-body"><div class="err-title">Traefik container detected but API is not accessible</div><div class="err-detail">' + escapeHtml(resp.error) + '</div><button class="err-retry" onclick="loadTraefik()">Retry</button></div></div>';
    container.innerHTML = html;
    return;
  }

  if (!resp.data) {
    container.innerHTML = '<div class="traefik-empty">No Traefik data available.</div>';
    return;
  }

  var d = resp.data;

  // --- Version banner ---
  if (d.version) {
    html += '<div class="traefik-version-banner"><strong>Traefik ' + escapeHtml(d.version.version) + '</strong>';
    if (d.version.codename) {
      html += ' (' + escapeHtml(d.version.codename) + ')';
    }
    html += '<div class="version-meta">';
    if (d.version.startDate) {
      html += '<span>Started: ' + escapeHtml(d.version.startDate) + '</span>';
    }
    if (d.version.goversion) {
      html += '<span>Go: ' + escapeHtml(d.version.goversion) + '</span>';
    }
    html += '</div>';
    if (d.apiUrl) {
      html += '<span class="traefik-source">API: ' + escapeHtml(d.apiUrl) + (d.authConfigured ? ' (authenticated)' : '') + '</span>';
    }
    html += '</div>';
  }

  // --- Endpoint errors info ---
  if (d.endpointErrors && Object.keys(d.endpointErrors).length > 0) {
    var errKeys = Object.keys(d.endpointErrors);
    html += '<div class="traefik-error-banner"><span class="err-icon">&#9888;</span><div class="err-body"><div class="err-title">Some Traefik API endpoints returned errors</div><div class="err-detail">' + errKeys.join(', ') + ' — showing partial data</div></div></div>';
  }

  // --- Overview stats ---
  if (d.overview) {
    html += '<div class="traefik-stats">';
    html += statCard(d.overview.http.routers, 'HTTP Routers', 'stat-http');
    html += statCard(d.overview.http.services, 'HTTP Services', 'stat-http');
    html += statCard(d.overview.http.middlewares, 'HTTP Middlewares', 'stat-middleware');
    html += statCard(d.overview.tcp.routers, 'TCP Routers', 'stat-tcp');
    html += statCard(d.overview.tcp.services, 'TCP Services', 'stat-tcp');
    html += statCard((d.entrypoints || []).length, 'Entrypoints', 'stat-entrypoint');
    html += '</div>';
  }

  // --- Entrypoints ---
  if (d.entrypoints && d.entrypoints.length > 0) {
    html += '<div class="traefik-section"><h2>Entrypoints</h2>';
    html += '<div class="traefik-table-wrap"><table class="traefik-table"><thead><tr><th>Name</th><th>Address</th></tr></thead><tbody>';
    for (var ep of d.entrypoints) {
      html += '<tr><td><strong>' + escapeHtml(ep.name) + '</strong></td><td><code>' + escapeHtml(ep.address) + '</code></td></tr>';
    }
    html += '</tbody></table></div></div>';
  } else if (d.endpointErrors && d.endpointErrors.entrypoints) {
    html += '<div class="traefik-section"><h2>Entrypoints</h2><div class="traefik-empty">Not available</div></div>';
  }

  // --- HTTP Routers ---
  if (d.httpRouters && d.httpRouters.length > 0) {
    html += '<div class="traefik-section"><h2>HTTP Routers</h2>';
    html += '<div class="traefik-table-wrap"><table class="traefik-table"><thead><tr><th>Name</th><th>Status</th><th>Rule</th><th>Service</th><th>EntryPoints</th><th>Middlewares</th><th>TLS</th></tr></thead><tbody>';
    for (var r of d.httpRouters) {
      html += '<tr>';
      html += '<td>' + escapeHtml(r.name) + '</td>';
      html += '<td>' + statusBadge(r.status) + '</td>';
      html += '<td class="traefik-rule">' + escapeHtml(r.rule) + '</td>';
      html += '<td class="traefik-service-name">' + escapeHtml(r.service) + '</td>';
      html += '<td>' + (r.entryPoints || []).map(function(e) { return '<span class="traefik-entrypoint-tag">' + escapeHtml(e) + '</span>'; }).join(' ') + '</td>';
      html += '<td>' + (r.middlewares || []).map(function(m) { return '<span class="traefik-middleware-tag">' + escapeHtml(m) + '</span>'; }).join(' ') + '</td>';
      html += '<td>' + (r.tls ? '<span class="traefik-tls-true">&#10003;</span>' : '<span class="traefik-tls-false">&mdash;</span>') + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div></div>';
  } else if (d.endpointErrors && d.endpointErrors.httpRouters) {
    html += '<div class="traefik-section"><h2>HTTP Routers</h2><div class="traefik-empty">Not available</div></div>';
  }

  // --- HTTP Services ---
  if (d.httpServices && d.httpServices.length > 0) {
    html += '<div class="traefik-section"><h2>HTTP Services</h2>';
    html += '<div class="traefik-table-wrap"><table class="traefik-table"><thead><tr><th>Name</th><th>Status</th><th>Type</th><th>Servers</th></tr></thead><tbody>';
    for (var s of d.httpServices) {
      html += '<tr>';
      html += '<td class="traefik-service-name">' + escapeHtml(s.name) + '</td>';
      html += '<td>' + statusBadge(s.status) + '</td>';
      html += '<td>' + escapeHtml(s.type) + '</td>';
      html += '<td>' + renderServerStatus(s.serverStatus) + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div></div>';
  } else if (d.endpointErrors && d.endpointErrors.httpServices) {
    html += '<div class="traefik-section"><h2>HTTP Services</h2><div class="traefik-empty">Not available</div></div>';
  }

  // --- Middlewares ---
  if (d.middlewares && d.middlewares.length > 0) {
    html += '<div class="traefik-section"><h2>Middlewares</h2>';
    html += '<div class="traefik-table-wrap"><table class="traefik-table"><thead><tr><th>Name</th><th>Type</th><th>Status</th></tr></thead><tbody>';
    for (var m of d.middlewares) {
      html += '<tr>';
      html += '<td><code>' + escapeHtml(m.name) + '</code></td>';
      html += '<td>' + escapeHtml(m.type) + '</td>';
      html += '<td>' + statusBadge(m.status) + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div></div>';
  } else if (d.endpointErrors && d.endpointErrors.middlewares) {
    html += '<div class="traefik-section"><h2>Middlewares</h2><div class="traefik-empty">Not available</div></div>';
  }

  // --- TCP Routers ---
  if (d.tcpRouters && d.tcpRouters.length > 0) {
    html += '<div class="traefik-section"><h2>TCP Routers</h2>';
    html += '<div class="traefik-table-wrap"><table class="traefik-table"><thead><tr><th>Name</th><th>Status</th><th>Rule</th><th>Service</th><th>EntryPoints</th><th>TLS</th></tr></thead><tbody>';
    for (var r of d.tcpRouters) {
      html += '<tr>';
      html += '<td>' + escapeHtml(r.name) + '</td>';
      html += '<td>' + statusBadge(r.status) + '</td>';
      html += '<td class="traefik-rule">' + escapeHtml(r.rule) + '</td>';
      html += '<td class="traefik-service-name">' + escapeHtml(r.service) + '</td>';
      html += '<td>' + (r.entryPoints || []).map(function(e) { return '<span class="traefik-entrypoint-tag">' + escapeHtml(e) + '</span>'; }).join(' ') + '</td>';
      html += '<td>' + (r.tls ? '<span class="traefik-tls-true">&#10003;</span>' : '<span class="traefik-tls-false">&mdash;</span>') + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div></div>';
  } else if (d.endpointErrors && d.endpointErrors.tcpRouters) {
    html += '<div class="traefik-section"><h2>TCP Routers</h2><div class="traefik-empty">Not available</div></div>';
  }

  // --- TCP Services ---
  if (d.tcpServices && d.tcpServices.length > 0) {
    html += '<div class="traefik-section"><h2>TCP Services</h2>';
    html += '<div class="traefik-table-wrap"><table class="traefik-table"><thead><tr><th>Name</th><th>Status</th><th>Type</th><th>Servers</th></tr></thead><tbody>';
    for (var s of d.tcpServices) {
      html += '<tr>';
      html += '<td class="traefik-service-name">' + escapeHtml(s.name) + '</td>';
      html += '<td>' + statusBadge(s.status) + '</td>';
      html += '<td>' + escapeHtml(s.type) + '</td>';
      html += '<td>' + renderServerStatus(s.serverStatus) + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div></div>';
  } else if (d.endpointErrors && d.endpointErrors.tcpServices) {
    html += '<div class="traefik-section"><h2>TCP Services</h2><div class="traefik-empty">Not available</div></div>';
  }

  // --- TLS Certificates ---
  if (d.tlsCerts && d.tlsCerts.length > 0) {
    html += '<div class="traefik-section"><h2>TLS Certificates</h2>';
    html += '<div class="traefik-table-wrap cert-table"><table class="traefik-table"><thead><tr><th>Name</th><th>Domains</th><th>Subject</th><th>Expires</th><th>Stores</th></tr></thead><tbody>';
    for (var cert of d.tlsCerts) {
      var expiryClass = 'cert-ok';
      var expiryText = escapeHtml(cert.notAfter || 'Unknown');
      if (cert.notAfter) {
        var expires = new Date(cert.notAfter);
        var now = new Date();
        var daysLeft = Math.floor((expires - now) / (1000 * 60 * 60 * 24));
        if (daysLeft < 0) {
          expiryClass = 'cert-expired';
          expiryText = 'EXPIRED ' + escapeHtml(cert.notAfter);
        } else if (daysLeft < 30) {
          expiryClass = 'cert-warning';
          expiryText = escapeHtml(cert.notAfter) + ' (' + daysLeft + ' days)';
        } else {
          expiryText = escapeHtml(cert.notAfter) + ' (' + daysLeft + ' days)';
        }
      }
      var domains = (cert.domains || []).map(function(d) {
        var s = escapeHtml(d.main);
        if (d.sans && d.sans.length > 0) {
          s += ' <span style="color:#6e7681;font-size:0.75rem">[+' + d.sans.length + ' SANs]</span>';
        }
        return '<div class="cert-domain">' + s + '</div>';
      }).join('');
      var subject = cert.subject && cert.subject.commonName ? escapeHtml(cert.subject.commonName) : '<span style="color:#6e7681">N/A</span>';
      html += '<tr>';
      html += '<td>' + escapeHtml(cert.name) + '</td>';
      html += '<td>' + domains + '</td>';
      html += '<td class="cert-subject">' + subject + '</td>';
      html += '<td class="' + expiryClass + '">' + expiryText + '</td>';
      html += '<td>' + (cert.stores || []).map(function(s) { return '<span class="traefik-entrypoint-tag">' + escapeHtml(s) + '</span>'; }).join(' ') + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div></div>';
  } else if (d.endpointErrors && d.endpointErrors.tlsCerts) {
    html += '<div class="traefik-section"><h2>TLS Certificates</h2><div class="traefik-empty">Not configured</div></div>';
  }

  container.innerHTML = html;
}

function statCard(count, label, cls) {
  return '<div class="traefik-stat-card ' + (cls || '') + '"><div class="stat-count">' + count + '</div><div class="stat-label">' + label + '</div></div>';
}

function statusBadge(status) {
  if (!status) return '<span class="status-badge disabled">Unknown</span>';
  var s = status.toLowerCase();
  if (s === 'enabled') return '<span class="status-badge enabled">Enabled</span>';
  if (s === 'disabled') return '<span class="status-badge disabled">Disabled</span>';
  if (s === 'warning') return '<span class="status-badge warning">Warning</span>';
  if (s === 'error') return '<span class="status-badge error">Error</span>';
  return '<span class="status-badge enabled">' + escapeHtml(status) + '</span>';
}

function renderServerStatus(serverStatus) {
  if (!serverStatus || Object.keys(serverStatus).length === 0) {
    return '<span style="color:#6e7681;font-size:0.8rem">None</span>';
  }
  var items = [];
  for (var url in serverStatus) {
    var status = serverStatus[url];
    var cls = 'server-unknown';
    if (status === 'UP') cls = 'server-up';
    else if (status === 'DOWN') cls = 'server-down';
    items.push('<div class="server-item ' + cls + '">' + escapeHtml(url) + '</div>');
  }
  return '<div class="traefik-server-list">' + items.join('') + '</div>';
}

</script>
</body>
</html>
